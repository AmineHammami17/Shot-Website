server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Any route that doesn't have a file extension (e.g. /about)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Add basic caching for static files
        location ~* \.(?:css|js|woff2?|eot|ttf|otf|png|jpe?g|gif|svg|ico|webp)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public";
        }
    }

    # Enable gzip compression inside the specific frontend server
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
