server {
    listen 80;
    server_name 102.211.209.82;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache fingerprinted Vite build assets aggressively.
    location ~* ^/assets/.*\.(?:css|js|mjs|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_pass http://frontend-client:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # During the current dev phase, keep public images fresh because their filenames are stable.
    location ^~ /images/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_pass http://frontend-client:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Route all requests starting with /api to the backend
    location /api/ {
        # The backend container exposes port 5000 internally.
        proxy_pass http://backend-server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store";
    }

    # Route all other root traffic to the frontend
    location / {
        # The frontend container exposes port 80 internally mapped from the new nginx static server
        proxy_pass http://frontend-client:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
